name: Build Android APK

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Build debug APK
        shell: bash
        run: |
          set +e
          gradle :app:assembleDebug --stacktrace --console=plain > gradle-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "===== GRADLE BUILD FAILURE — LAST 180 LINES ====="
            tail -n 180 gradle-build.log
            exit "$status"
          fi
          echo "===== GRADLE BUILD SUCCESS — LAST 40 LINES ====="
          tail -n 40 gradle-build.log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smart-tasks-gradle-log
          path: gradle-build.log
          if-no-files-found: ignore
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: smart-tasks-alarm-debug
          path: app/build/outputs/apk/debug/app-debug.apk
