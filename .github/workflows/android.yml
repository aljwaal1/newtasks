name: Build Android APK

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Lint and build universal debug APK
        shell: bash
        run: |
          set +e
          gradle :app:lintDebug :app:assembleDebug --stacktrace --console=plain > gradle-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "===== ANDROID CHECK FAILURE — LAST 220 LINES ====="
            tail -n 220 gradle-build.log
            exit "$status"
          fi
          echo "===== ANDROID CHECK SUCCESS — LAST 60 LINES ====="
          tail -n 60 gradle-build.log
          echo "===== APK CONTENTS: NATIVE LIBRARIES ====="
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep ' lib/' || echo "No native libraries: APK bytecode is architecture-independent"
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smart-tasks-gradle-log
          path: gradle-build.log
          if-no-files-found: ignore
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smart-tasks-lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: smart-tasks-universal-android5plus-v1.3.0
          path: app/build/outputs/apk/debug/app-debug.apk
