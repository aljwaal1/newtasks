name: Publish Smart Tasks 1.3.1

on:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/publish-v1.3.1.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: feature/unified-ui-v1.3

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Lint and build universal APK
        shell: bash
        run: |
          set -euo pipefail
          gradle :app:lintDebug :app:assembleDebug --stacktrace --console=plain
          cp app/build/outputs/apk/debug/app-debug.apk SmartTasks-1.3.1-Universal.apk
          unzip -t SmartTasks-1.3.1-Universal.apk
          sha256sum SmartTasks-1.3.1-Universal.apk > SmartTasks-1.3.1-Universal.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartTasks-1.3.1-Universal
          path: |
            SmartTasks-1.3.1-Universal.apk
            SmartTasks-1.3.1-Universal.apk.sha256

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3.1-test
          name: Smart Tasks 1.3.1 Test
          prerelease: true
          target_commitish: feature/unified-ui-v1.3
          files: |
            SmartTasks-1.3.1-Universal.apk
            SmartTasks-1.3.1-Universal.apk.sha256
          body: |
            نسخة اختبار من Smart Tasks 1.3.1.
            تتضمن إصلاح تشغيل الصوت وإدخال الساعة والدقائق والواجهة المبسطة.
            تدعم Android 5.0 فأعلى وأجهزة 32-bit و64-bit.
