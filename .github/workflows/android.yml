name: Build and Publish Android APK

on:
  push:
    branches:
      - feature/unified-ui-v1.3
      - build/v1.3.1
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove duplicated date and time helpers
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/src/main/java/com/aljwaal/newtasks/TaskEditor.kt")
          text = path.read_text(encoding="utf-8")
          marker = "\nprivate fun setRelativeDate(sourceMillis: Long, days: Int): Long {"

          if marker in text:
              text = text[:text.index(marker)].rstrip() + "\n"
              path.write_text(text, encoding="utf-8")
              print("Removed duplicate setRelativeDate/setTime helpers from TaskEditor.kt")
          else:
              print("Duplicate helper block already absent")
          PY

      - name: Persist source correction on build branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/build/v1.3.1'
        shell: bash
        run: |
          if git diff --quiet -- app/src/main/java/com/aljwaal/newtasks/TaskEditor.kt; then
            echo "Source already clean"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/aljwaal/newtasks/TaskEditor.kt
          git commit -m "Remove duplicate date and time helper functions"
          git push origin HEAD:build/v1.3.1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Lint and build universal debug APK
        shell: bash
        run: |
          set +e
          gradle :app:lintDebug :app:assembleDebug --stacktrace --console=plain > gradle-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "===== ANDROID CHECK FAILURE — LAST 220 LINES ====="
            tail -n 220 gradle-build.log
            exit "$status"
          fi
          echo "===== ANDROID CHECK SUCCESS — LAST 60 LINES ====="
          tail -n 60 gradle-build.log
          echo "===== APK CONTENTS: NATIVE LIBRARIES ====="
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep ' lib/' || echo "No native libraries: APK bytecode is architecture-independent"
          cp app/build/outputs/apk/debug/app-debug.apk SmartTasks-1.3.1-Universal.apk
          unzip -t SmartTasks-1.3.1-Universal.apk
          sha256sum SmartTasks-1.3.1-Universal.apk | tee SmartTasks-1.3.1-Universal.apk.sha256

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smart-tasks-gradle-log
          path: gradle-build.log
          if-no-files-found: ignore

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smart-tasks-lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: smart-tasks-universal-android5plus-v1.3.1
          path: |
            SmartTasks-1.3.1-Universal.apk
            SmartTasks-1.3.1-Universal.apk.sha256

      - name: Publish direct GitHub download
        if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/build/v1.3.1' || github.ref == 'refs/heads/feature/unified-ui-v1.3')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3.1-test
          name: Smart Tasks 1.3.1 Test
          prerelease: true
          target_commitish: build/v1.3.1
          fail_on_unmatched_files: true
          files: |
            SmartTasks-1.3.1-Universal.apk
            SmartTasks-1.3.1-Universal.apk.sha256
          body: |
            نسخة اختبار من Smart Tasks 1.3.1.
            تتضمن إصلاح تشغيل الصوت وإدخال الساعة والدقائق.
            تدعم Android 5.0 فأعلى وأجهزة 32-bit و64-bit.
